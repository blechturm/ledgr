items:
  - feedback_id: "2026-05-25_001_multi_output_indicator_bundles/FB-001"
    episode_id: "2026-05-25_001_multi_output_indicator_bundles"
    title: "Task expects bundle and single-output TTR IDs to match, but docs and behavior say they intentionally differ"
    bucket: bad_example
    severity: medium
    duplicate_of: null
    evidence: "The task says the BBands bundle should be a pure authoring convenience that produces the same feature identity as `ledgr_ind_ttr(\"BBands\", input = \"close\", output = \"up\", n = 20)`. In ledgr 0.1.8.2, the bundle entry ID was `bbands_up`, while the hand-written single-output ID was `ttr_bbands_20_up`. Evidence: raw_logs/multi_output_indicator_results.txt shows `Single-output BBands up ID: ttr_bbands_20_up`, `Bundle BBands up ID: bbands_up`, and `IDs match: FALSE`."
    recommended_action: "Update the task/spec wording to distinguish runtime flattening from exact ID preservation, or change ledgr defaults if exact single-output ID preservation is the intended contract."
    uncertainty: "Evidence shows a mismatch; maintainer must decide whether docs, task text, or package behavior should change."
  - feedback_id: "2026-05-25_001_multi_output_indicator_bundles/FB-002"
    episode_id: "2026-05-25_001_multi_output_indicator_bundles"
    title: "Sweep docs do not show a focused extraction example for feature fingerprints and feature-set hashes"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "The task asks users to inspect `feature_fingerprints` and `provenance$feature_set_hash`. The sweep print notes those are hidden columns, but I had to infer the exact list-column extraction shape with `$feature_fingerprints` and `vapply(sweep_results$provenance, function(x) x$feature_set_hash, character(1))`. Evidence: raw_logs/multi_output_indicator_results.txt contains the manual extraction and comparison output for both list columns."
    recommended_action: "Add a focused example to the sweeps vignette and `?ledgr_sweep` showing how to inspect and compare `feature_fingerprints` and `provenance$feature_set_hash`."
    uncertainty: "None noted."
  - feedback_id: "2026-05-25_001_multi_output_indicator_bundles/FB-003"
    episode_id: "2026-05-25_001_multi_output_indicator_bundles"
    title: "Episode task metadata target differs from preflight required ledgr version"
    bucket: expected_user_error
    severity: low
    duplicate_of: null
    evidence: "`TASK.md` metadata lists `ledgr_target: v0.1.8.1`, while the episode instructions and auditr preflight require `>= 0.1.8.2` and observed `0.1.8.2`. Evidence: TASK.md lists `ledgr_target: \"v0.1.8.1\"`; raw_logs/preflight_stdout.txt contains `[1] '0.1.8.2'`."
    recommended_action: "Keep task metadata and episode preflight requirements synchronized."
    uncertainty: "Likely episode, shell, or environment friction rather than a ledgr defect."
  - feedback_id: "2026-05-25_002_yahoo_universe_sweep_per_strategy/FB-001"
    episode_id: "2026-05-25_002_yahoo_universe_sweep_per_strategy"
    title: "ledgr_snapshot_seal return shape differs from documentation"
    bucket: docs_gap
    severity: medium
    duplicate_of: null
    evidence: "`ledgr_snapshot_seal(snapshot)` returned a list with `$hash` and `$snapshot`, but the rendered vignette and task workflow imply it returns the hash directly. Evidence: raw_logs/debug_snapshot_seal.txt"
    recommended_action: "Update `?ledgr_snapshot_seal` and `LEDGR_DOCS/experiment-store.md` to show `$hash`, or restore the documented bare-character return."
    uncertainty: "None noted."
  - feedback_id: "2026-05-25_002_yahoo_universe_sweep_per_strategy/FB-002"
    episode_id: "2026-05-25_002_yahoo_universe_sweep_per_strategy"
    title: "Failed-candidate diagnostics are not shown as concrete accessors"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "The docs say `ledgr_candidate(..., allow_failed = TRUE)` is for diagnostic extraction of failed params and error details, but they do not show where the error lives on the returned object. I first tried top-level fields and got `NULL`; the error was available through `candidate$row$error_class` and `candidate$row$error_msg`. Evidence: raw_logs/inspect_attempt_2_results.txt"
    recommended_action: "Add a short failed-candidate inspection snippet to the sweeps vignette and `?ledgr_candidate`."
    uncertainty: "None noted."
  - feedback_id: "2026-05-25_002_yahoo_universe_sweep_per_strategy/FB-003"
    episode_id: "2026-05-25_002_yahoo_universe_sweep_per_strategy"
    title: "Sweep tables need a documented flat export pattern"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "Writing `as.data.frame(sweep_results)` to CSV failed because sweep results contain list columns including `params`, `warnings`, `feature_fingerprints`, and `provenance`. Evidence: raw_logs/reproducible_script_attempt_2_stderr.txt"
    recommended_action: "Document a `select(where(is.atomic))` or equivalent base-R pattern, or provide a `ledgr_sweep_summary()` helper for flat export."
    uncertainty: "None noted."
  - feedback_id: "2026-05-25_002_yahoo_universe_sweep_per_strategy/FB-004"
    episode_id: "2026-05-25_002_yahoo_universe_sweep_per_strategy"
    title: "Strategy docs are inconsistent about ctx equity accessor shape"
    bucket: bad_example
    severity: low
    duplicate_of: null
    evidence: "`?ledgr_strategy_context` documents `ctx$equity` as current simulated portfolio state, but one strategy-development example uses `ctx$equity()` as if it were a function. Evidence: LEDGR_DOCS/strategy-development.md contains `ctx$equity() * params$equity_fraction`; `raw_logs/ledgr_strategy_context.txt` documents `ctx$cash` and `ctx$equity`."
    recommended_action: "Normalize the strategy-development examples to `ctx$equity` or document callable accessors explicitly."
    uncertainty: "Evidence shows a mismatch; maintainer must decide whether docs, task text, or package behavior should change."
  - feedback_id: "2026-05-25_003_adversarial_preflight_and_force_override/FB-001"
    episode_id: "2026-05-25_003_adversarial_preflight_and_force_override"
    title: "Task Tier 2 example conflicts with installed preflight rules"
    bucket: bad_example
    severity: medium
    duplicate_of: null
    evidence: "The task brief suggested a Tier 2 strategy could call a qualified package function such as stats::median(), but installed ledgr 0.1.8.2 classified a strategy using stats::median() as tier_1 because base/recommended R references are allowed. Evidence: raw_logs/reproducible_results.txt shows stats_median_probe tier: tier_1."
    recommended_action: "Update the adversarial task text and any docs/examples that use stats::median() as a Tier 2 example; use a non-base, non-recommended package-qualified function instead."
    uncertainty: "Evidence shows a mismatch; maintainer must decide whether docs, task text, or package behavior should change."
  - feedback_id: "2026-05-25_003_adversarial_preflight_and_force_override/FB-002"
    episode_id: "2026-05-25_003_adversarial_preflight_and_force_override"
    title: "Task global-variable Tier 3 requirement conflicts with reproducibility docs"
    bucket: bad_example
    severity: medium
    duplicate_of: null
    evidence: "The task required a defined global variable not in params to be classified as tier_3, but ledgr classified external scalar, vector, list, and environment objects as tier_2 resolved external objects. Evidence: raw_logs/reproducible_results.txt shows external_global_value_probe tier: tier_2; raw_logs/probe_external_symbol_variants_stdout.txt shows scalar, vector, list, and environment variants all tier_2."
    recommended_action: "Clarify the task and docs with separate examples for resolved external values (Tier 2) and unresolved/user helper functions (Tier 3)."
    uncertainty: "Evidence shows a mismatch; maintainer must decide whether docs, task text, or package behavior should change."
  - feedback_id: "2026-05-25_003_adversarial_preflight_and_force_override/FB-003"
    episode_id: "2026-05-25_003_adversarial_preflight_and_force_override"
    title: "Mutable external environment classified as Tier 2"
    bucket: unclear
    severity: medium
    duplicate_of: null
    evidence: "A strategy that referenced external_env$qty, where external_env was a mutable environment in the calling session, was classified as tier_2 and allowed. This is surprising because the value can change outside params and outside stored strategy source. Evidence: raw_logs/probe_external_symbol_variants_stdout.txt shows external_env tier: tier_2, allowed: TRUE."
    recommended_action: "Add a static-analysis rule or documentation note specifically for captured environments and other mutable external objects."
    uncertainty: "Evidence shows friction or surprising behavior, but the intended contract is not established."
  - feedback_id: "2026-05-25_003_adversarial_preflight_and_force_override/FB-004"
    episode_id: "2026-05-25_003_adversarial_preflight_and_force_override"
    title: "Run-info absence check is not documented as a no-row verification pattern"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "The task asked to confirm no run rows were written by querying ledgr_run_info(), but the help page documents successful run metadata and does not state that a missing run raises ledgr_run_not_found. Evidence: raw_logs/reproducible_results.txt shows ledgr_run_info: tier3_attempt returned class ledgr_run_not_found and message Run not found: tier3_attempt."
    recommended_action: "Add an example or details section to ?ledgr_run_info showing how to verify missing run IDs after failed preflight attempts."
    uncertainty: "None noted."
  - feedback_id: "2026-05-25_004_adversarial_inputs_csv_bundle_registration/FB-001"
    episode_id: "2026-05-25_004_adversarial_inputs_csv_bundle_registration"
    title: "High-level CSV error classes are easy to confuse with low-level CSV import classes"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "The task asked for the documented snapshot error class and gave LEDGR_CSV_FORMAT_ERROR as an example, but ledgr_snapshot_from_csv() raised ledgr_invalid_args or ledgr_invalid_timestamp. The help page does explain this split, but the rendered vignette mostly says CSV/snapshot error without restating the class distinction.  Evidence: raw_logs/adversarial_workflow_results.txt"
    recommended_action: "Add a compact class table to the rendered CSV section showing ledgr_snapshot_from_csv() classes and low-level import classes side by side. "
    uncertainty: "None noted."
  - feedback_id: "2026-05-25_004_adversarial_inputs_csv_bundle_registration/FB-002"
    episode_id: "2026-05-25_004_adversarial_inputs_csv_bundle_registration"
    title: "Missing-column CSV error uses data-frame wording"
    bucket: unclear
    severity: low
    duplicate_of: null
    evidence: "Calling ledgr_snapshot_from_csv() on a CSV missing close failed with \"bars_df missing required column(s): close\", even though the user action was importing a CSV file.  Evidence: raw_logs/adversarial_workflow_results.txt"
    recommended_action: "Wrap high-level CSV validation errors with CSV-specific context, for example \"CSV is missing required column(s): close\". "
    uncertainty: "Evidence shows friction or surprising behavior, but the intended contract is not established."
