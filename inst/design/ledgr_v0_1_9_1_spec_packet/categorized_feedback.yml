items:
  - feedback_id: '2026-06-04_001_cold_start_readme/FB-001'
    episode_id: '2026-06-04_001_cold_start_readme'
    title: 'Installed package overview has no minimal runnable smoke example'
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: 'The task asked for the main README or equivalent package overview and its first complete example. DOC_DISCOVERY.R found no installed README, and ?ledgr-package listed vignettes but did not include a short runnable example that confirms ledgr is installed and working. Evidence: raw_logs/ledgr_doc_snapshot.md lists only NEWS.md under README-style files; raw_logs/ledgr-package.txt lists Start here vignettes but no executable example.'
    recommended_action: 'Add a short installed overview example to ?ledgr-package, or install a README/pkgdown overview that includes a minimal ledgr_run() smoke test using ledgr_demo_bars or synthetic data.'
    uncertainty: 'No additional uncertainty recorded.'
  - feedback_id: '2026-06-04_001_cold_start_readme/FB-002'
    episode_id: '2026-06-04_001_cold_start_readme'
    title: 'Package overview points to a pkgdown-only positioning article'
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: '?ledgr-package says positioning detail is in the pkgdown-only ''Who ledgr is for'' article and gives an external URL. In an offline/no-network episode, that installed package overview cannot be followed from local docs. Evidence: raw_logs/ledgr-package.txt'
    recommended_action: 'Install the positioning article with the package documentation or add a local summary in ?ledgr-package for offline users.'
    uncertainty: 'No additional uncertainty recorded.'
  - feedback_id: '2026-06-04_002_cold_start_getting_started/FB-001'
    episode_id: '2026-06-04_002_cold_start_getting_started'
    title: 'Docs index does not label the first-contact workflow'
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: 'The task asked for the current first-contact workflow article or closest equivalent, but LEDGR_DOCS/index.md only listed rendered vignette titles and did not explicitly mark a start-here, getting-started, or first-contact article. I inferred that research-workflow was the correct entry point from the discovery snapshot and the article text. Evidence: LEDGR_DOCS/index.md lists rendered vignettes including research-workflow but contains no explicit first-contact, getting-started, or start-here label for that article.'
    recommended_action: 'Add a short "Start here" section to the rendered docs index and installed package overview that explicitly links to Research Workflow as the first-contact end-to-end workflow.'
    uncertainty: 'No additional uncertainty recorded.'
  - feedback_id: '2026-06-04_003_strategy_development_article/FB-001'
    episode_id: '2026-06-04_003_strategy_development_article'
    title: 'Final-bar no-fill warning code is not exposed as a warning class'
    bucket: missing_api
    severity: low
    duplicate_of: null
    evidence: 'The strategy-development article shows a `LEDGR_LAST_BAR_NO_FILL` warning during the mapped-feature run. Capturing the warning programmatically showed only base classes `simpleWarning, warning, condition`; the ledgr-specific code exists only in the message text. In contrast, the helper documentation for `select_top_n()` documents classed warning behavior, and the partial-selection warning was classed as `ledgr_partial_selection`. Evidence: raw_logs/reproducible_script_stdout.txt shows `mapped warning class: simpleWarning,warning,condition` and `partial selection warning class: ledgr_partial_selection,rlang_warning,warning,condition`.'
    recommended_action: 'Add a ledgr-specific warning class for the final-bar no-fill condition, or document in the strategy-development article and `?ledgr_run` that this warning currently has only base warning classes.'
    uncertainty: 'No additional uncertainty recorded.'
  - feedback_id: '2026-06-04_004_strategy_helper_introduction/FB-001'
    episode_id: '2026-06-04_004_strategy_helper_introduction'
    title: 'Helper discovery task names the answers'
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: 'The task asks the agent to discover the strategy helper functions through documentation alone, but the Goal section lists `signal_return`, `select_top_n`, `weight_equal`, and `target_rebalance` by name. Evidence: TASK.md: Goal lists the helper functions; Constraints says to discover helpers through help pages, vignettes, or exported package index.'
    recommended_action: 'Reword the task brief so the user-facing goal describes the pipeline conceptually, with exact helper names moved to hidden acceptance criteria or removed.'
    uncertainty: 'No additional uncertainty recorded.'
  - feedback_id: '2026-06-04_004_strategy_helper_introduction/FB-002'
    episode_id: '2026-06-04_004_strategy_helper_introduction'
    title: 'Individual helper help pages do not show the full pipeline'
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: 'The installed help pages for the individual helper functions are accurate, but each page mostly shows a small isolated example. A first-time user has to follow the article links or find the strategy-development vignette to see the four helpers composed into a complete strategy and run. Evidence: raw_logs/signal_return.txt; raw_logs/select_top_n.txt; raw_logs/weight_equal.txt; raw_logs/target_rebalance.txt'
