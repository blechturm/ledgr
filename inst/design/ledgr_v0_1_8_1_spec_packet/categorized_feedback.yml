items:
  - feedback_id: "2026-05-15_001_cold_start_readme/FB-001"
    episode_id: "2026-05-15_001_cold_start_readme"
    title: "Installed package lacks a runnable README-style overview"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "The task asked for the main README or equivalent package overview. DOC_DISCOVERY.R found no installed main README. The only README-style installed file was examples/README.md, and it says the examples are non-executable development artifacts with no implementations yet. raw_logs/ledgr_doc_snapshot.md; installed examples/README.md says \"Non-executable example configurations and walkthrough artifacts used during development; no implementations yet.\""
    recommended_action: "Add an installed README.md or make ?ledgr-package explicitly label getting-started as the README-equivalent first-run workflow."
    uncertainty: ""
  - feedback_id: "2026-05-15_001_cold_start_readme/FB-002"
    episode_id: "2026-05-15_001_cold_start_readme"
    title: "Minimal ledgr_run example does not print a smoke-test confirmation"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "The ?ledgr_run example is a complete small run, but it assigns bt and then closes resources without printing the backtest, a result table, or any explicit success check. In a noninteractive script this gives a new user little confirmation that ledgr worked. raw_logs/ledgr_run.txt; raw_logs/reproducible_script_stdout.txt shows the added print output needed for a useful smoke test."
    recommended_action: "Update the ?ledgr_run example to print the backtest and inspect one result table before closing resources."
    uncertainty: ""
  - feedback_id: "2026-05-15_001_cold_start_readme/FB-003"
    episode_id: "2026-05-15_001_cold_start_readme"
    title: "Closed-trade terminology is easy to miss in first-run output"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "After adding summary output to the compact ledgr_run example, summary(bt) reported Total Trades: 0 while ledgr_results(bt, what = \"ledger\") showed one BUY fill. The detailed help later clarified that total trades counts closed trade rows only, not fill rows, but that distinction is not visible in the compact first-run example. raw_logs/reproducible_script_stdout.txt"
    recommended_action: "In the minimal example or summary output notes, use \"Closed Trades\" instead of \"Total Trades\", or add a one-line pointer that fills and closed trades are separate result tables."
    uncertainty: ""
  - feedback_id: "2026-05-15_002_cold_start_getting_started/FB-001"
    episode_id: "2026-05-15_002_cold_start_getting_started"
    title: "Getting-started version context is ambiguous under ledgr 0.1.8"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "The episode required ledgr >= 0.1.8 and preflight observed 0.1.8.0, but TASK.md listed ledgr_target v0.1.7.2 and the getting-started vignette introduced the workflow as the v0.1.7 research loop. raw_logs/preflight_stdout.txt; raw_logs/reproducible_script_status.json"
    recommended_action: "Update the task packet and getting-started vignette introduction to state the current supported ledgr version range for the workflow, or explicitly say the v0.1.7 research loop remains valid in 0.1.8.x."
    uncertainty: ""
  - feedback_id: "2026-05-15_003_single_asset_sma_crossover/FB-001"
    episode_id: "2026-05-15_003_single_asset_sma_crossover"
    title: "SMA crossover docs stop short of a complete runnable strategy"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "The indicators vignette documents the SMA crossover feature map and the core condition, but the runnable example immediately below uses a return-plus-SMA rule instead of a full SMA crossover strategy. LEDGR_DOCS/indicators.md and raw_logs/reproducible_script_stdout.txt"
    recommended_action: "Add a short end-to-end SMA crossover example, preferably single-asset, immediately after the crossover snippet."
    uncertainty: ""
  - feedback_id: "2026-05-15_003_single_asset_sma_crossover/FB-002"
    episode_id: "2026-05-15_003_single_asset_sma_crossover"
    title: "print(summary(bt)) prints both summary and backtest handle"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "In an exploratory script, wrapping `summary(bt)` in `print()` printed the ledgr Backtest Summary and then printed the ledgr Backtest Results handle. This made the log look like two different result objects were being emitted. Exploratory run showed both \"ledgr Backtest Summary\" and \"ledgr Backtest Results\" blocks after `print(summary(bt))`; final script uses bare `summary(bt)` as the workaround."
    recommended_action: "Document the return value and recommended script usage for `summary.ledgr_backtest`, or return a printed summary object instead of the original backtest handle."
    uncertainty: ""
  - feedback_id: "2026-05-15_003_single_asset_sma_crossover/FB-003"
    episode_id: "2026-05-15_003_single_asset_sma_crossover"
    title: "Signal terminology is easy to over-apply to simple feature rules"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "The strategy-development vignette introduces a signal-selection-weight-target pipeline, while the SMA crossover example in the indicators vignette is just a mapped feature comparison that returns target holdings. As a first-time user, it was not immediately clear whether an SMA crossover should be represented as a `ledgr_signal` object or as direct strategy logic. LEDGR_DOCS/strategy-development.md and LEDGR_DOCS/indicators.md"
    recommended_action: "Add a compact glossary or note near the SMA crossover section explaining indicators/features versus optional signal helper objects versus executable targets."
    uncertainty: ""
  - feedback_id: "2026-05-15_004_multi_asset_momentum/FB-001"
    episode_id: "2026-05-15_004_multi_asset_momentum"
    title: "summary return value is surprising when printed explicitly"
    bucket: duplicate
    severity: low
    duplicate_of: "2026-05-15_003_single_asset_sma_crossover/FB-002"
    evidence: "While capturing a reproducible transcript, calling `print(summary(bt))` printed the ledgr backtest summary and then also printed the underlying `ledgr_backtest` object. The getting-started vignette shows `summary(bt)`, but the help and vignette did not make it obvious that wrapping it in `print()` can duplicate output. raw_logs/summary_print_duplicate_stdout.txt contains both `ledgr Backtest Summary` and `ledgr Backtest Results` from a minimal `print(summary(bt))` reproduction."
    recommended_action: "Document the return value and printing behavior in `?summary.ledgr_backtest`, and consider returning the summary object invisibly if the function is intended primarily for formatted side-effect output."
    uncertainty: "Advisory duplicate; human maintainer should confirm whether to merge with duplicate_of."
  - feedback_id: "2026-05-15_005_rsi_mean_reversion/FB-001"
    episode_id: "2026-05-15_005_rsi_mean_reversion"
    title: "Indicator function signature differs between custom indicator docs and built-in RSI object"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "The custom indicator vignette describes the scalar indicator function as fn(window, params), while the built-in RSI help example calls ledgr_ind_rsi(3)$fn(window). When I tried the custom-indicator-style call against the built-in RSI object, it failed with an unused argument error. raw_logs/debug_rsi_docs_examples_stdout.txt"
    recommended_action: "Add a sentence to ?ledgr_ind_rsi or the custom indicator vignette clarifying whether the $fn signature is part of the public contract for built-in indicators, or point users back to ledgr_feature_contracts(), ledgr_pulse_snapshot(), and ctx$features() for normal use."
    uncertainty: ""
  - feedback_id: "2026-05-15_005_rsi_mean_reversion/FB-002"
    episode_id: "2026-05-15_005_rsi_mean_reversion"
    title: "Native RSI help page lacks feature ID and warmup contract context"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "The native RSI help page only shows the constructor and a direct scalar $fn example. The feature ID, requires_bars, stable_after, and strategy usage pattern were available in the indicators vignette, but not on the function help page itself. raw_logs/ledgr_ind_rsi.txt"
    recommended_action: "Expand ?ledgr_ind_rsi with a feature-map example, its generated feature ID, and the requires_bars/stable_after contract."
    uncertainty: ""
  - feedback_id: "2026-05-15_006_bbands_macd/FB-001"
    episode_id: "2026-05-15_006_bbands_macd"
    title: "ledgr_ind_ttr help does not show rendered MACD feature IDs"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "The help page example constructs matching MACD macd and signal indicators with percent = FALSE, then calls ledgr_feature_id(list(macd, macd_signal)), but the saved help text does not show the expected output strings. The rendered indicators vignette does show the exact IDs. raw_logs/ledgr_ind_ttr.txt"
    recommended_action: "Add rendered expected output to the ledgr_ind_ttr MACD example or include a short note naming the expected default ID shape for matching percent = FALSE outputs."
    uncertainty: ""
  - feedback_id: "2026-05-15_006_bbands_macd/FB-002"
