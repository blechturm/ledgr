items:
  - feedback_id: "2026-05-24_001_multi_output_indicator_bundles/FB-001"
    episode_id: "2026-05-24_001_multi_output_indicator_bundles"
    title: "Default BBands bundle IDs do not match hand-written single-output TTR IDs"
    bucket: unclear
    severity: medium
    duplicate_of: null
    evidence: >-
      Bundle BBands output up had feature ID bbands_up, while the equivalent ledgr_ind_ttr call produced ttr_bbands_20_up.
    recommended_action: >-
      Decide whether IDs should align; either change generated IDs or document shorter bundle IDs and the explicit id workaround.
    uncertainty: >-
      Raw evidence proves a mismatch, but not whether this is an implementation bug or intentional API behavior.
