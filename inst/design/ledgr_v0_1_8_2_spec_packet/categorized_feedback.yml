    title: "Preflight Contract Alignment"
    bucket: ledgr_bug
    severity: high
    episode_ids: ["2026-05-24_003_adversarial_preflight_and_force_override", "2026-05-24_007_helper_pipeline_troubleshooting", "2026-05-24_008_unguided_yahoo_research_question"]
