    evidence: >-
      Raw feedback and reports show Sys.time and superassignment did not follow the expected tier_3 path, resolved globals conflicted with params-boundary guidance, examples did not reliably produce the expected tier, and helper functions were rejected as unresolved symbols.
    recommended_action: >-
      Reconcile ledgr_strategy_preflight behavior with the reproducibility documentation, then add compact examples for tier_1, tier_2, tier_3, helper reuse, and no-force rejection wording.
    uncertainty: >-
      Some rows are clear behavior bugs, while others may be intentional tier semantics that need stronger documentation rather than code changes.
