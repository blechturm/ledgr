    title: "Partial `naming` map needs explicit `outputs` filter"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: >-
      A naming vector for dn and up failed until outputs was also set to c("dn", "up").
    recommended_action: >-
      Document that naming is not an output filter and show subset renaming with outputs = names(naming).
    uncertainty: ""
