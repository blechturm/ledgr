    bucket: docs_gap
    severity: medium
    episode_ids: ["2026-05-01_003_single_asset_sma_crossover", "2026-05-01_004_multi_asset_momentum", "2026-05-01_005_rsi_mean_reversion", "2026-05-01_009_edge_case_ten_bars"]
