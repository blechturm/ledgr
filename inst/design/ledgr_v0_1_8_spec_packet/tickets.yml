version: "0.1.8-sweep-mode"
source: "v0_1_8_tickets.md"
tickets:
  - id: LDG-2101
    title: "Scope Baseline And Ticket Synchronization"
    status: done
    priority: P0
    dependencies: []
    tests:
      - "documentation/routing review"
      - "ticket/yml consistency review"
      - "scope grep for forbidden public APIs"
    classification:
      risk_level: high
      implementation_tier: L
      review_tier: M
      classification_reason: >
        This ticket freezes the release scope and dependency graph before
        touching the execution engine. A bad baseline would make later
        code-review results hard to interpret.
      invariants_at_risk:
        - release scope discipline
        - ticket/status consistency
        - roadmap/spec alignment
      required_context:
        - inst/design/ledgr_v0_1_8_spec_packet/v0_1_8_spec.md
        - inst/design/ledgr_v0_1_8_spec_packet/v0_1_8_tickets.md
        - inst/design/ledgr_v0_1_8_spec_packet/tickets.yml
        - inst/design/contracts.md
        - inst/design/ledgr_roadmap.md
      tests_required:
        - documentation/routing review
      escalation_triggers:
        - a central design doc contradicts the active spec
        - a non-goal is required to satisfy a ticket
        - ticket and YAML metadata cannot be reconciled
      forbidden_actions:
        - changing runtime R code
        - implementing sweep APIs
        - changing package version metadata

  - id: LDG-2102
    title: "Private Fold Core And Output Handler Boundary"
    status: done
    priority: P0
    dependencies: [LDG-2101]
    tests:
      - "tests/testthat targeted runner tests"
      - "tests/testthat targeted provenance/status/telemetry tests"
      - "full testthat recommended before review"
    classification:
      risk_level: release-critical
      implementation_tier: H
      review_tier: H
      classification_reason: >
        This is the central execution refactor. It touches runner control flow,
        persistence side effects, failure handling, and future sweep parity.
      invariants_at_risk:
        - single execution semantics
        - ledger/event meaning
        - telemetry/status correctness
        - Tier 3 preflight rejection
        - no exported fold-core API
      required_context:
        - inst/design/ledgr_v0_1_8_spec_packet/v0_1_8_spec.md
        - inst/design/contracts.md
        - inst/design/architecture/ledgr_v0_1_8_sweep_architecture.md
        - inst/design/architecture/sweep_mode_code_review.md
        - R/backtest-runner.R
        - R/backtest.R
      tests_required:
        - targeted runner tests
        - targeted telemetry/status/failure tests
      escalation_triggers:
        - fold extraction changes ledger event ordering
        - output-handler boundary cannot preserve existing fail_run semantics
        - telemetry side-channel removal requires schema changes
        - existing ledgr_run behavior changes outside documented parity work
      forbidden_actions:
        - exporting ledgr_run_fold()
        - adding ledgr_sweep()
        - changing public fill semantics
        - changing snapshot or config identity

  - id: LDG-2103
    title: "Internal Fill Timing And Cost Boundary Preservation"
    status: done
    priority: P1
    dependencies: [LDG-2102]
    tests:
      - "targeted fill/cash-delta tests"
      - "config_hash fixture test"
      - "comparison metric parity checks"
    classification:
      risk_level: high
      implementation_tier: M
      review_tier: H
      classification_reason: >
        Cost and timing are load-bearing execution semantics. The ticket must
        create the future boundary without changing present fills or config
        identity.
      invariants_at_risk:
        - fill timing
        - fee/cash delta semantics
        - config_hash stability
        - no-lookahead strategy context
      required_context:
        - inst/design/rfc/rfc_cost_model_architecture_response.md
        - inst/design/contracts.md
        - R/backtest-runner.R
      tests_required:
        - targeted fill model tests
        - config_hash stability tests
      escalation_triggers:
        - existing helper cannot be wrapped without behavior drift
        - config_hash changes for unchanged scalar config
        - execution context would expose next-bar data to strategy ctx
      forbidden_actions:
        - exporting cost-model APIs
        - adding broker/exchange fee templates
        - changing spread_bps semantics
        - adding liquidity or quantity mutation behavior

  - id: LDG-2104
    title: "RNG Boundary And Execution Seed Support"
    status: done
    priority: P0
    dependencies: [LDG-2102]
    tests:
      - "targeted seed tests"
      - "preflight tests for RNG mutation patterns"
      - "config/provenance seed identity tests"
    classification:
      risk_level: high
      implementation_tier: M
      review_tier: H
      classification_reason: >
        Seed support changes a previously rejected public argument and becomes
        part of promotion reproducibility. It must not depend on ambient
        session RNG.
      invariants_at_risk:
        - deterministic execution
        - reproducible stochastic promotion
        - run identity
        - RNG preflight semantics
      required_context:
        - inst/design/rfc/rfc_rng_contract_v0_1_8.md
        - inst/design/rfc/rfc_rng_contract_v0_1_8_response.md
        - R/backtest.R
        - R/backtest-runner.R
      tests_required:
        - targeted seed tests
        - preflight RNG tests
      escalation_triggers:
        - seed storage changes config_hash expectations unexpectedly
        - seed derivation cannot be made platform-stable
        - ctx$seed becomes required to satisfy basic promotion parity
      forbidden_actions:
        - deriving seeds from .Random.seed
        - using worker/daemon assignment in seed derivation
        - adding public stochastic helper APIs without ticket scope

  - id: LDG-2105
    title: "Parameter Grid Audit And Label Stability"
    status: done
    priority: P1
    dependencies: [LDG-2101]
    tests:
      - "tests/testthat targeted param-grid tests"
      - "documentation contract tests if help text changes"
    classification:
      risk_level: medium
      implementation_tier: M
      review_tier: M
      classification_reason: >
        Candidate labels become user-facing promotion identity. Instability or
        duplicate handling errors would contaminate sweep outputs and seed
        derivation.
      invariants_at_risk:
        - candidate label stability
        - canonical JSON identity
        - no duplicate candidate labels
      required_context:
        - R/param-grid.R
        - R/config-canonical-json.R
        - inst/design/ledgr_v0_1_8_spec_packet/v0_1_8_spec.md
      tests_required:
        - targeted param-grid tests
      escalation_triggers:
        - existing auto labels are not stable enough for seed derivation
        - grid object structure cannot support promotion metadata
      forbidden_actions:
        - adding a second grid constructor/class
        - using deparse() for candidate identity
        - treating grid labels as committed run IDs

  - id: LDG-2106
    title: "Precomputed Feature Object And Warmup Validation"
    status: done
    priority: P1
    dependencies: [LDG-2102, LDG-2105]
    tests:
      - "targeted feature precompute tests"
      - "warmup/scoring-range validation tests"
      - "snapshot mismatch tests"
    classification:
      risk_level: high
      implementation_tier: H
      review_tier: H
      classification_reason: >
        Precomputed features sit on the no-lookahead and warmup boundary.
        Incorrect coverage or fingerprinting would make sweep results
        non-reproducible.
      invariants_at_risk:
        - feature fingerprint identity
        - snapshot hash binding
        - warmup/scoring range separation
        - candidate-specific feature feasibility
      required_context:
        - inst/design/architecture/ledgr_feature_map_ux.md
        - inst/design/architecture/ledgr_v0_1_8_sweep_architecture.md
        - R/experiment.R
        - R/features*.R
      tests_required:
        - targeted precompute tests
        - warmup coverage tests
      escalation_triggers:
        - feature factories cannot be resolved without executing strategy code
        - warmup metadata cannot be represented without changing snapshot APIs
        - precompute object cannot validate the union of feature fingerprints
      forbidden_actions:
        - mutating sealed snapshots
        - exposing persisted feature-series retrieval as a public API
        - silently falling back to live feature computation when precompute mismatches

  - id: LDG-2107
    title: "Feature-Factory Indicator Sweep Support"
    status: done
    priority: P1
    dependencies: [LDG-2105, LDG-2106]
    tests:
      - "targeted feature-factory sweep tests"
      - "candidate failure tests"
      - "parity fixture setup for LDG-2112"
    classification:
      risk_level: high
      implementation_tier: M
      review_tier: H
      classification_reason: >
        Indicator-parameter sweeps are a core v0.1.8 workflow and stress the
        feature identity, warmup, and failure-classification boundaries.
      invariants_at_risk:
        - feature-factory semantics
        - candidate-specific fingerprints
        - failure classification
        - sweep/run parity
      required_context:
        - R/experiment.R
        - R/param-grid.R
        - inst/design/ledgr_v0_1_8_spec_packet/v0_1_8_spec.md
      tests_required:
        - feature-factory sweep tests
      escalation_triggers:
        - feature factories require strategy execution to discover features
        - candidate-specific feature failure cannot be isolated cleanly
      forbidden_actions:
        - adding a separate indicator-sweep API
        - collapsing all feature identity into sweep-level union metadata only
        - silently skipping invalid candidate features

  - id: LDG-2108
    title: "Sequential ledgr_sweep() And ledgr_sweep_results"
    status: done
    priority: P0
    dependencies: [LDG-2102, LDG-2104, LDG-2105, LDG-2106]
    tests:
      - "targeted ledgr_sweep tests"
      - "memory-output-handler tests"
      - "failure semantics tests"
      - "standard metric column tests"
      - "feature-consuming strategy tests"
      - "no DuckDB write artifact tests"
      - "shared-core export-surface tests"
      - "feature value parity tests"
      - "precomputed feature factory call-counter tests"
      - "non-RNG sweep_id tests"
    classification:
      risk_level: release-critical
      implementation_tier: H
      review_tier: H
      classification_reason: >
        This ticket introduces the public sweep API. It must reuse the fold
        core and preserve error semantics while avoiding durable run side
        effects.
      invariants_at_risk:
        - single execution semantics
        - candidate failure isolation
        - contract error handling
        - summary metric correctness
        - no hidden throwaway persistence
        - opening-position FIFO/cost-basis parity
        - feature-consuming strategy parity
        - sweep_id generation without RNG side effects
      required_context:
        - inst/design/architecture/ledgr_sweep_mode_ux.md
        - inst/design/rfc/rfc_sweep_memory_output_handler_v0_1_8.md
        - inst/design/rfc/rfc_sweep_memory_output_handler_v0_1_8_response.md
        - inst/design/contracts.md
        - R/backtest.R
        - R/backtest-runner.R
      tests_required:
        - targeted sweep tests
        - memory-output-handler tests
        - failure semantics tests
        - feature-consuming strategy tests
        - shared-core export-surface tests
        - feature value parity tests
        - precomputed feature factory call-counter tests
      escalation_triggers:
        - sweep requires a second execution loop
        - sweep requires writing candidate runs to DuckDB, even temporarily
        - summary metrics cannot be produced without retaining full event streams
        - contract errors cannot be separated from candidate failures
        - injected output handlers cannot preserve current ledgr_run transaction behavior
        - post-loop feature/equity materialization cannot be separated cleanly from candidate summary output
      forbidden_actions:
        - writing run artifacts for sweep candidates
        - writing tempfile DuckDB run artifacts for sweep candidates
        - using ledgr_run() against a throwaway store as the sweep execution path
        - adding objective/ranking arguments
        - adding public parallel execution

  - id: LDG-2108A
    title: "Sweep Performance Measurement"
    status: done
    priority: P2
    dependencies: [LDG-2108]
    tests:
      - "benchmark script smoke run"
      - "performance report review"
      - "git status artifact check"
    classification:
      risk_level: medium
      implementation_tier: L
      review_tier: M
      classification_reason: >
        This ticket measures the runtime effect of the memory-backed sweep core
        before result/provenance polish. It should inform expectations without
        changing runtime semantics.
      invariants_at_risk:
        - performance claim accuracy
        - artifact cleanliness
        - no benchmark-driven semantic changes
      required_context:
        - R/sweep.R
        - R/fold-core.R
        - inst/design/rfc/rfc_sweep_memory_output_handler_v0_1_8_response.md
      tests_required:
        - benchmark script smoke run
        - git status artifact check
      escalation_triggers:
        - memory-backed sweep is not measurably faster than persistent run loop
        - benchmark requires changing runtime code
        - generated artifacts cannot be isolated from the workspace
      forbidden_actions:
        - changing runtime semantics to improve benchmark numbers
        - committing generated benchmark databases or timing outputs
        - treating benchmark timing as semantic parity evidence

  - id: LDG-2108B
    title: "Sweep Hot-Path Profiling Spike"
    status: done
    priority: P2
    dependencies: [LDG-2108A]
    tests:
      - "profiling script smoke run"
      - "profiling report review"
      - "git status artifact check"
    classification:
      risk_level: medium
      implementation_tier: L
      review_tier: M
      classification_reason: >
        This ticket profiles the memory-backed sweep hot path after measured
        speedups were modest. It exists to avoid blind optimization before the
        provenance and promotion work continues.
      invariants_at_risk:
        - performance diagnosis accuracy
        - no premature optimization
        - artifact cleanliness
      required_context:
        - dev/spikes/ledgr_sweep_performance/run_benchmark.R
        - inst/design/audits/sweep_performance_measurement.md
        - R/sweep.R
        - R/fold-core.R
      tests_required:
        - profiling script smoke run
        - git status artifact check
      escalation_triggers:
        - profiling shows one low-risk hotspot large enough to justify immediate work
        - profiling requires invasive runtime instrumentation
        - generated profiler artifacts cannot be kept out of the workspace
      forbidden_actions:
        - changing runtime semantics in the profiling ticket
        - adding public profiling or benchmarking APIs
        - including optimization changes in this ticket
        - treating profiler output as semantic parity evidence

  - id: LDG-2109
    title: "Sweep Output Provenance Columns And Print Curation"
    status: done
    priority: P1
    dependencies: [LDG-2107, LDG-2108, LDG-2108A, LDG-2108B]
    tests:
      - "targeted ledgr_sweep_results tests"
      - "print snapshot tests"
      - "column order tests"
      - "sweep metadata tests"
    classification:
      risk_level: high
      implementation_tier: M
      review_tier: H
      classification_reason: >
        Sweep result rows are the user promotion surface. Missing seeds,
        ambiguous provenance, or unreadable print output would make promotion
        unsafe.
      invariants_at_risk:
        - candidate replay identity
        - row-level provenance
        - result table usability
        - warning class preservation
        - sweep_id preservation in result metadata
      required_context:
        - inst/design/rfc/rfc_sweep_candidate_promotion_contract_v0_1_8_synthesis_response.md
        - inst/design/architecture/ledgr_sweep_mode_ux.md
      tests_required:
        - result shape tests
        - print tests
      escalation_triggers:
        - dplyr operations drop required row-level identity
        - warnings cannot be preserved without unsafe condition serialization
        - print output cannot stay readable with list columns
      forbidden_actions:
        - hiding execution_seed from default print
        - storing per-candidate feature identity only in attributes
        - replacing warnings list column with lossy strings

  - id: LDG-2110
    title: "Candidate Selection And Promotion API"
    status: done
    priority: P1
    dependencies: [LDG-2109]
    tests:
      - "targeted candidate/promotion tests"
      - "same-snapshot validation tests"
      - "print tests"
    classification:
      risk_level: high
      implementation_tier: M
      review_tier: H
      classification_reason: >
        This API is the ergonomic bridge from exploratory sweep to committed
        run. Errors here could silently promote the wrong params or seed.
      invariants_at_risk:
        - promotion params correctness
        - promotion seed correctness
        - snapshot lineage checking
        - failed-candidate safety
      required_context:
        - inst/design/rfc/rfc_sweep_candidate_promotion_contract_v0_1_8_synthesis_response.md
        - inst/design/contracts.md
      tests_required:
        - candidate extraction tests
        - promotion forwarding tests
      escalation_triggers:
        - dplyr-stripped sweep rows cannot retain enough metadata for promotion
        - selected candidate cannot be represented without full sweep attributes
      forbidden_actions:
        - requiring users to manually extract params[[1]]
        - promoting failed candidates by default
        - treating missing snapshot provenance as success under require_same_snapshot

  - id: LDG-2111
    title: "Promotion Context Store And Read Helpers"
    status: todo
    priority: P1
    dependencies: [LDG-2110]
    tests:
      - "schema migration tests"
      - "promotion context write/read tests"
      - "source_sweep_json sweep_id tests"
      - "run_info integration tests"
    classification:
      risk_level: high
      implementation_tier: M
      review_tier: H
      classification_reason: >
        This ticket adds a durable store table and selection-audit metadata. It
        must not corrupt existing run stores or turn sweep outputs into full
        persisted artifacts.
      invariants_at_risk:
        - experiment-store schema compatibility
        - promoted run auditability
        - read-only inspection
        - no full sweep persistence
      required_context:
        - inst/design/rfc/rfc_sweep_promotion_context_v0_1_8_decision.md
        - R/run-store.R
        - R/backtest.R
      tests_required:
        - schema migration tests
        - promotion context read/write tests
      escalation_triggers:
        - schema version 107 conflicts with another pending schema change
        - canonical JSON cannot safely represent candidate summaries
        - promotion context write failures cannot be isolated from successful runs
      forbidden_actions:
        - adding ledgr_save_sweep()
        - storing full sweep ledger/equity/event streams
        - storing full R warning condition objects durably
        - rolling back successful ledgr_run() because context write failed

  - id: LDG-2112
    title: "Sweep Parity Test Suite"
    status: todo
    priority: P0
    dependencies: [LDG-2103, LDG-2107, LDG-2109, LDG-2111]
    tests:
      - "dedicated parity tests"
      - "targeted runner/sweep tests"
      - "full testthat required before release gate"
    classification:
      risk_level: release-critical
      implementation_tier: H
      review_tier: H
      classification_reason: >
        The release promise is one execution semantics. This suite is the gate
        that prevents sweep from becoming a second engine.
      invariants_at_risk:
        - ledgr_run/ledgr_sweep parity
        - feature-factory parity
        - seeded promotion reproducibility
        - fill/cost semantics
        - config_hash stability
      required_context:
        - inst/design/ledgr_v0_1_8_spec_packet/v0_1_8_spec.md
        - inst/design/contracts.md
        - tests/testthat
      tests_required:
        - dedicated parity test suite
      escalation_triggers:
        - parity requires retaining full event streams for all sweep candidates
        - seeded promotion cannot reproduce the selected candidate
        - feature-factory parity exposes unresolved feature lookup differences
      forbidden_actions:
        - weakening parity assertions to fit implementation drift
        - accepting same-platform numeric divergence without a bug ticket
        - bypassing the shared fold core in tests

  - id: LDG-2113
    title: "Evaluation Discipline And Sweep Documentation"
    status: todo
    priority: P1
    dependencies: [LDG-2110, LDG-2111, LDG-2112]
    tests:
      - "documentation contract tests"
      - "targeted vignette/render checks"
      - "manual docs review"
    classification:
      risk_level: high
      implementation_tier: M
      review_tier: H
      classification_reason: >
        Sweep makes overfitting easy. Documentation must teach the epistemic
        boundary clearly and avoid presenting exploratory sweep winners as
        validated results.
      invariants_at_risk:
        - evaluation discipline
        - promotion UX correctness
        - non-goal clarity
        - public API documentation
      required_context:
        - inst/design/architecture/ledgr_sweep_mode_ux.md
        - inst/design/contracts.md
        - vignettes
        - README.md
      tests_required:
        - documentation contract tests
        - targeted render checks
      escalation_triggers:
        - docs require APIs not implemented by prior tickets
        - examples imply ledgr-owned ranking/objective semantics
        - train/test discipline cannot be explained without a split helper
      forbidden_actions:
        - adding ledgr_snapshot_split()
        - adding ledgr_tune()
        - implying sweep results are out-of-sample by default
        - documenting full sweep artifact persistence as shipped

  - id: LDG-2114
    title: "v0.1.8 Release Gate"
    status: todo
    priority: P0
    dependencies: [LDG-2112, LDG-2113]
    tests:
      - "testthat full suite"
      - "R CMD build"
      - "R CMD check --no-manual --no-build-vignettes"
      - "tools/check-coverage.R"
      - "pkgdown build/check"
      - "CI status"
    classification:
      risk_level: release-critical
      implementation_tier: M
      review_tier: H
      classification_reason: >
        This is the release gate for a runtime API milestone. It must catch
        status drift, generated artifacts, failing checks, stale docs, and CI
        failures before tagging.
      invariants_at_risk:
        - release integrity
        - ticket/status consistency
        - package check health
        - documentation/admin pointer accuracy
      required_context:
        - inst/design/ledgr_v0_1_8_spec_packet/v0_1_8_spec.md
        - inst/design/ledgr_v0_1_8_spec_packet/v0_1_8_tickets.md
        - inst/design/ledgr_v0_1_8_spec_packet/tickets.yml
        - inst/design/release_ci_playbook.md
        - NEWS.md
        - DESCRIPTION
      tests_required:
        - full testthat
        - R CMD check
        - coverage check
        - pkgdown check
        - CI
      escalation_triggers:
        - parity suite fails
        - CI differs from local checks
        - release metadata conflicts with active branch/version
        - docs/admin pointers cannot be reconciled
      forbidden_actions:
