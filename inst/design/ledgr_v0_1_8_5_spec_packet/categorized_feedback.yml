items:
  - feedback_id: "2026-05-26_001_cold_start_readme/FB-001"
    episode_id: "2026-05-26_001_cold_start_readme"
    title: "Installed package has no obvious top-level README first-run example"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "For a task framed as running the README example, the installed documentation snapshot did not list a top-level README. It listed `examples/README.md`, but that file says it is not a user-facing first-run path and redirects to vignettes. The correct first-run path had to be inferred from `?ledgr-package` and the getting-started vignette. Evidence: raw_logs/ledgr_doc_snapshot.md; installed ledgr/examples/README.md says `This directory is not a user-facing first-run path.`"
    recommended_action: "Ship or expose an installed README/package overview that directly says `Start here: vignette('getting-started', package = 'ledgr')` and identifies it as the maintained first complete example."
    uncertainty: ""
  - feedback_id: "2026-05-26_001_cold_start_readme/FB-002"
    episode_id: "2026-05-26_001_cold_start_readme"
    title: "Getting-started first-run example depends on suggested tidyverse helpers"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "The maintained first-run example attaches `dplyr` and `tibble` before any ledgr workflow code. The vignette says those packages are suggested helpers rather than part of the strategy contract, but it does not provide a ledgr-only or base R cold-start version. Evidence: LEDGR_DOCS/scripts/getting-started.R attaches `library(dplyr)` and `library(tibble)`; raw_logs/getting_started_full_status.json shows the script worked in this episode because those packages were available."
    recommended_action: "Add a minimal cold-start code block to the getting-started vignette that uses only ledgr and base R, or add an explicit prerequisites line for the suggested packages used by the runnable vignette script."
    uncertainty: ""
  - feedback_id: "2026-05-26_001_cold_start_readme/FB-003"
    episode_id: "2026-05-26_001_cold_start_readme"
    title: "Cleanup pattern in getting-started is unclear for copied scripts"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "The getting-started workflow introduces `on.exit(close(bt), add = TRUE)` after the first run, then later performs explicit final cleanup with `close(bt)`, `close(bt_qty_20)`, and `ledgr_snapshot_close(snapshot)`. As a first-time user copying pieces into a script, it was unclear whether closing the same object twice is expected, harmless, or only safe in this particular flow. Evidence: raw_logs/getting_started_full_status.json exit_status 0; cleanup calls appear in LEDGR_DOCS/scripts/getting-started.R."
    recommended_action: "Clarify the recommended cleanup pattern for short scripts versus long sessions, and document whether `close()`/`ledgr_snapshot_close()` are intentionally idempotent."
    uncertainty: ""
  - feedback_id: "2026-05-26_001_cold_start_readme/FB-004"
    episode_id: "2026-05-26_001_cold_start_readme"
    title: "Git status is blocked by safe-directory ownership check"
    bucket: expected_user_error
    severity: low
    duplicate_of: null
    evidence: "A final `git status --short` check failed because Git considered `C:/Users/maxth/Documents/GitHub/auditr` unsafe due to ownership. Evidence: fatal: unsafe repository ('C:/Users/maxth/Documents/GitHub/auditr' is owned by someone else)"
    recommended_action: "Configure the repository with `git config --global --add safe.directory C:/Users/maxth/Documents/GitHub/auditr` in the episode environment when Git status checks are expected."
    uncertainty: ""
  - feedback_id: "2026-05-26_002_cold_start_getting_started/FB-001"
    episode_id: "2026-05-26_002_cold_start_getting_started"
    title: "Rendered getting-started output has stale config hash"
    bucket: bad_example
    severity: low
    duplicate_of: null
    evidence: "The durable store section in the rendered getting-started vignette prints a specific Config Hash value for `ledgr_run_info()`, but running the prepared getting-started script against installed ledgr 0.1.8.4 produced a different Config Hash for the same documented workflow. Evidence: `LEDGR_DOCS/getting-started.md` shows Config Hash `b139f3a801fe93150b00e888a47631adb4e290ea6ec68712d01e97855bc50464`; the observed run in `raw_logs/vignette_getting_started_stdout.txt` printed `5611eb42e280acd26e911d0677f705f256222c809fad3ca9c23a8050133d2b01`."
    recommended_action: "Re-render the vignette with ledgr 0.1.8.4 if the hash should be stable, or redact exact hash values in rendered examples and add a short note that identity hashes may differ across package versions or configuration changes."
    uncertainty: ""
  - feedback_id: "2026-05-26_003_single_asset_sma_crossover/FB-001"
    episode_id: "2026-05-26_003_single_asset_sma_crossover"
    title: "No direct documented contract inspection path for active-alias feature parameters"
    bucket: missing_api
    severity: low
    duplicate_of: null
    evidence: "The active-alias workflow uses feature_params in ledgr_run() and ledgr_pulse_snapshot(), so I expected ledgr_feature_contracts() to accept the same feature_params argument for inspecting the concrete fast and slow SMA contracts before running. It failed with an unused-argument error. Evidence: raw_logs/reproducible_script_stderr.txt"
    recommended_action: "Document the recommended way to materialize or inspect active-alias feature contracts for one feature_params set, or add a feature_params argument to ledgr_feature_contracts() if that fits the API."
    uncertainty: ""
  - feedback_id: "2026-05-26_003_single_asset_sma_crossover/FB-002"
    episode_id: "2026-05-26_003_single_asset_sma_crossover"
    title: "summary(bt) is easy to double-print in scripts"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "In a scripted run I wrapped summary(bt) in print(), which printed the ledgr summary and then printed the returned backtest object as a second block. The help page explains that the input backtest is returned invisibly, but the examples do not warn script authors not to wrap summary(bt) in print(). Evidence: raw_logs/reproducible_script_iter2_stdout.txt"
    recommended_action: "Add a short note near summary examples that summary(bt) prints output directly and ledgr_compute_metrics() should be used when a structured metric object is needed."
    uncertainty: ""
  - feedback_id: "2026-05-26_004_multi_asset_momentum/FB-001"
    episode_id: "2026-05-26_004_multi_asset_momentum"
    title: "Last-bar no-fill warning can look like a failed run in first examples"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "The completed two-asset momentum run exited with status 0 and produced valid results, but stderr contained `LEDGR_LAST_BAR_NO_FILL`. As a first-time user reviewing captured episode logs, seeing a warning in stderr made it less obvious whether the task should be considered successful. Evidence: raw_logs/final_reproducible_script_stderr.txt"
    recommended_action: "Add a short note near the helper-pipeline backtest examples explaining when `LEDGR_LAST_BAR_NO_FILL` is expected noise for examples and when users should extend the snapshot or change final-pulse behavior."
    uncertainty: ""
  - feedback_id: "2026-05-26_005_edge_case_ten_bars/FB-001"
    episode_id: "2026-05-26_005_edge_case_ten_bars"
    title: "ledgr_feature_contracts fails opaquely on parameterized feature maps"
    bucket: ledgr_bug
    severity: medium
    duplicate_of: null
    evidence: "The documented getting-started feature map uses ledgr_param() for SMA windows. Calling ledgr_feature_contracts() on that feature map failed with a low-level vapply() length error before I could inspect required bars. Evidence: raw_logs/reproducible_script_stdout.txt"
    recommended_action: "Add validation for unresolved ledgr_param() values in ledgr_feature_contracts(), return a ledgr classed error, and document the recommended contract-inspection path for parameterized feature maps."
    uncertainty: "Parser row marks triage unclear; raw evidence supports user-visible friction, but maintainer must decide whether this is implementation behavior, documentation contract, or expected use."
  - feedback_id: "2026-05-26_005_edge_case_ten_bars/FB-002"
    episode_id: "2026-05-26_005_edge_case_ten_bars"
    title: "Impossible warmup is only visible after calling summary"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "Running the documented SMA crossover on 10 bars with slow_n = 40 emitted zero warnings and printed as a completed backtest with unchanged equity. The useful message appeared only in summary() as Warmup Diagnostics. Evidence: raw_logs/reproducible_script_stdout.txt"
    recommended_action: "Add a short zero-fill troubleshooting note to ?ledgr_run and the getting-started SMA example, or expose impossible-warmup diagnostics as a structured accessor or run-info field in addition to summary() printing."
    uncertainty: ""
  - feedback_id: "2026-05-26_006_close_lifecycle/FB-001"
    episode_id: "2026-05-26_006_close_lifecycle"
    title: "Closed backtest handle result access is not stated explicitly"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "The close documentation says completed artifacts are already durable and ordinary result inspection opens and closes read connections per operation, but the experiment-store vignette also says result-table helpers need a live or reopened backtest handle. As a first-time user, I could not tell whether the original handle should still support result access after close(bt). In practice, summary(bt), print(bt), ledgr_results(bt, \"equity\"), ledgr_results(bt, \"trades\"), and a second close(bt) all succeeded after the first close(bt). Evidence: raw_logs/close_lifecycle_observations.txt"
    recommended_action: "Add a short close lifecycle example to ?close.ledgr_backtest showing ledgr_results(bt, \"equity\") before close(bt), after close(bt), and after ledgr_run_open(). Reword \"live or reopened backtest handle\" to clarify that a closed handle can still read completed run artifacts if that behavior is intentional."
    uncertainty: ""
  - feedback_id: "2026-05-26_006_close_lifecycle/FB-002"
    episode_id: "2026-05-26_006_close_lifecycle"
    title: "Close guidance mentions lazy result cursors without a discoverable example"
    bucket: docs_gap
    severity: low
    duplicate_of: null
    evidence: "The docs say close(bt) is useful for explicit-open workflows and lazy result cursors, but the documentation I consulted did not show a lazy result cursor example or name the user-facing API that creates one. That made the \"when is close required\" part of the task harder to interpret. Evidence: Exact recurring phrase: \"explicit-open workflows, and lazy result cursors\"; no lazy cursor example appeared in the consulted lifecycle docs."
    recommended_action: "Either add a lazy result cursor example and API reference, or remove that phrase from beginner lifecycle docs until the public cursor workflow is documented."
    uncertainty: ""
  - feedback_id: "2026-05-26_007_help_page_discoverability/FB-001"
    episode_id: "2026-05-26_007_help_page_discoverability"
    title: "Core execution help pages do not link to Getting Started"
    bucket: docs_gap
    severity: low
