name: R-CMD-check

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest, coverage: true }
          - { os: windows-latest, coverage: false }

    env:
      _R_CHECK_FORCE_SUGGESTS_: "false"
      LEDGR_COVERAGE_THRESHOLD: "80"

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::covr
            any::pkgload
            any::pkgdown
            any::knitr
            any::rmarkdown
            any::DT
            any::htmltools
          needs: check

      - name: Run README cold-start check
        run: |
          Rscript --vanilla tools/check-readme-example.R

      - name: Run v0.1.x acceptance tests first
        run: |
          Rscript -e "pkgload::load_all('.', quiet = TRUE); testthat::test_local('.', filter = 'acceptance-v0.1', reporter = 'summary', load_package = 'none')"

      - name: Run R CMD check
        run: |
          Rscript -e "rcmdcheck::rcmdcheck(args = c('--no-manual', '--no-build-vignettes'), error_on = 'warning', check_dir = 'check')"

      - name: Build pkgdown site
        if: runner.os == 'Linux'
        run: |
          Rscript -e "pkgdown::build_site(new_process = FALSE)"

      - name: Run coverage threshold
        if: matrix.config.coverage
        run: |
          Rscript tools/check-coverage.R

      - uses: actions/upload-artifact@v4
        if: matrix.config.coverage
        with:
          name: coverage-report
          path: coverage.html
